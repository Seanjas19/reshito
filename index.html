<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Reshito</title>
</head>
<body>
    <div class="form-container">
        <form class="form" id="form">
            <input type="date" class="date" id="date">
            <p class="date-err-msg" id="date-err-msg"></p>
            <select name="payment-method" class="payment-method" id="payment-method">
                <option value="">Payment Method</option>
                <option value="Cash">Cash</option>
                <option value="Credit/Debit Card">Credit/Debit Card</option>
                <option value="FPX Banking">FPX Banking</option>
                <option value="E-Wallet">E-Wallet</option>
            </select>
            <p class="payment-err-msg" id="payment-err-msg"></p>
            <input type="text" placeholder="Description" class="description" id="description">
            <p class="descript-err-msg" id="descript-err-msg"></p>
            <input type="number" placeholder="Quantity" class="quantity" id="quantity">
            <p class="quantity-err-msg" id="quantity-err-msg"></p>
            <input type="number" placeholder="Cost" class="cost" id="cost">
            <p class="cost-err-msg" id="cost-err-msg"></p>
            <button type="submit" class="submit" id="submit">Submit</button>
        </form>
    </div>
    <div class="table-container">
        <table class="table" id="table">
            <thead class="table-head" id="table-head">
                <tr>
                    <th>Date</th>
                    <th>Payment Method</th>
                    <th>Description</th>
                    <th>Quantity</th>
                    <th>Cost</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody class="table-body" id="table-body">
                
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
